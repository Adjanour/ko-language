<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#0D0D1A"/>

  <text x="80" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#F59E0B" opacity="0.3">"</text>

  <text x="100" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF">
    <tspan x="100" dy="0">I built a programming language</tspan>
    <tspan x="100" dy="60">to prove a point.</tspan>
  </text>

  <text x="100" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="30" fill="#A1A1AA">
    <tspan x="100" dy="0">Not because Kō is production-ready today.</tspan>
    <tspan x="100" dy="50">Or that AI can replace the craft.</tspan>
  </text>

  <text x="100" y="620" font-family="system-ui, -apple-system, sans-serif" font-size="34" fill="#E4E4E7">
    <tspan x="100" dy="0">But I believe understanding plus conviction</tspan>
    <tspan x="100" dy="55">is still enough to turn an idea into</tspan>
    <tspan x="100" dy="55">something real. And that skill is worth</tspan>
    <tspan x="100" dy="55">more than any generated shortcut.</tspan>
  </text>

  <text x="100" y="870" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#F59E0B">
    <tspan x="100" dy="0">Build weird things.</tspan>
    <tspan x="100" dy="60">Then go build useful ones.</tspan>
  </text>

  <text x="980" y="920" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#F59E0B" opacity="0.3">"</text>

  <line x1="80" y1="980" x2="1000" y2="980" stroke="#27272A" stroke-width="1"/>
  <text x="540" y="1024" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" fill="#52525B">github.com/Adjanour/ko-language</text>
</svg>