<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#0D0D1A"/>

  <!-- Opening quote mark -->
  <text x="80" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#F59E0B" opacity="0.3">"</text>

  <!-- Statement body -->
  <text x="100" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">
    <tspan x="100" dy="0">For fun and to see what's possible,</tspan>
    <tspan x="100" dy="55">I built a programming language.</tspan>
  </text>

  <text x="100" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#A1A1AA">
    <tspan x="100" dy="0">Not because it's production-ready.</tspan>
    <tspan x="100" dy="48">Not because I think AI can just</tspan>
    <tspan x="100" dy="48">build a language.</tspan>
  </text>

  <text x="100" y="660" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#E4E4E7">
    <tspan x="100" dy="0">But because I had ideas,</tspan>
    <tspan x="100" dy="50">understood enough about how these things worked,</tspan>
    <tspan x="100" dy="50">and believe you now have the ability</tspan>
    <tspan x="100" dy="50">to realise a vision —</tspan>
    <tspan x="100" dy="55" font-weight="700" fill="#F59E0B">then after actually go learn</tspan>
    <tspan x="100" dy="55" font-weight="700" fill="#F59E0B">and build something useful.</tspan>
  </text>

  <!-- Closing quote -->
  <text x="980" y="920" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#F59E0B" opacity="0.3">"</text>

  <!-- Footer -->
  <line x1="80" y1="980" x2="1000" y2="980" stroke="#27272A" stroke-width="1"/>
  <text x="540" y="1024" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" fill="#52525B">github.com/Adjanour/ko-language</text>
</svg>