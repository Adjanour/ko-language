<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#0D0D1A"/>

  <circle cx="540" cy="540" r="480" fill="none" stroke="#F59E0B" stroke-width="0.5" opacity="0.08"/>
  <circle cx="540" cy="540" r="380" fill="none" stroke="#F59E0B" stroke-width="0.5" opacity="0.06"/>
  <circle cx="540" cy="540" r="280" fill="none" stroke="#F59E0B" stroke-width="0.5" opacity="0.04"/>

