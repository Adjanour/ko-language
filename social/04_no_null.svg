<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#0D0D1A"/>

  <text x="540" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF" letter-spacing="-2">The $1 trillion mistake? Not here.</text>
  <text x="540" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#A1A1AA">Kō uses types, not null checks, to guarantee safety.</text>

  <rect x="60" y="330" width="460" height="420" rx="12" fill="#1A1A2E"/>
  <rect x="60" y="330" width="460" height="50" rx="12" fill="#27272A"/>
  <text x="290" y="362" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#71717A">NULL (the old way)</text>
  <text x="90" y="440" font-family="ui-monospace, monospace" font-size="24" fill="#A1A1AA">
    <tspan x="90" dy="0">function greet(name) {</tspan>
    <tspan x="90" dy="48">  if (!name) {</tspan>
    <tspan x="90" dy="48">    throw new Error(...)</tspan>
    <tspan x="90" dy="48">  }</tspan>
    <tspan x="90" dy="48">  return "Hello, " + name</tspan>
    <tspan x="90" dy="48">}</tspan>
  </text>
  <text x="290" y="685" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#FF6B6B">Runtime crash or forgotten check</text>

  <rect x="560" y="330" width="460" height="420" rx="12" fill="#1A1A2E"/>
  <rect x="560" y="330" width="460" height="50" rx="12" fill="#F59E0B" opacity="0.15"/>
  <text x="790" y="362" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#F59E0B">MAYBE (Kō)</text>
  <text x="590" y="440" font-family="ui-monospace, monospace" font-size="24" fill="#E4E4E7">
    <tspan x="590" dy="0">type Maybe a =</tspan>
    <tspan x="590" dy="48">  | Just a</tspan>
    <tspan x="590" dy="48">  | Nothing</tspan>
    <tspan x="590" dy="48">fn greet m =</tspan>
    <tspan x="590" dy="48">  match m</tspan>
    <tspan x="590" dy="48">    | Just n => n</tspan>
    <tspan x="590" dy="48">    | Nothing => "nope"</tspan>
  </text>
  <text x="790" y="685" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#F59E0B">Exhaustive. Compiler-enforced.</text>

  <text x="540" y="850" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF">No null. No exceptions. No runtime surprises.</text>

  <line x1="80" y1="980" x2="1000" y2="980" stroke="#27272A" stroke-width="1"/>
  <text x="540" y="1024" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" fill="#52525B">github.com/Adjanour/ko-language</text>
</svg>