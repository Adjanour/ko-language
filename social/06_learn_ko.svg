<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#0D0D1A"/>

  <text x="540" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#FFFFFF" letter-spacing="-2">Learn Kō in 60 seconds</text>
  <text x="540" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#A1A1AA">Five patterns. One language you can actually hold in your head.</text>

  <g transform="translate(120, 290)">
    <rect x="0" y="0" width="44" height="44" rx="10" fill="#F59E0B"/>
    <text x="22" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#0D0D1A">1</text>
    <text x="70" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">Define a function</text>
    <text x="70" y="66" font-family="ui-monospace, monospace" font-size="22" fill="#F59E0B">fn add a b = a + b</text>
  </g>

  <g transform="translate(120, 410)">
    <rect x="0" y="0" width="44" height="44" rx="10" fill="#52525B"/>
    <text x="22" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">2</text>
    <text x="70" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">Pipe data through it</text>
    <text x="70" y="66" font-family="ui-monospace, monospace" font-size="22" fill="#E4E4E7">5 |&gt; add 1 |&gt; add 2   # =&gt; 8</text>
  </g>

  <g transform="translate(120, 530)">
    <rect x="0" y="0" width="44" height="44" rx="10" fill="#52525B"/>
    <text x="22" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">3</text>
    <text x="70" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">Model absence with ADTs</text>
    <text x="70" y="66" font-family="ui-monospace, monospace" font-size="22" fill="#E4E4E7">type Maybe a = Just a | Nothing</text>
  </g>

  <g transform="translate(120, 650)">
    <rect x="0" y="0" width="44" height="44" rx="10" fill="#52525B"/>
    <text x="22" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">4</text>
    <text x="70" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">Match exhaustively</text>
    <text x="70" y="66" font-family="ui-monospace, monospace" font-size="22" fill="#E4E4E7">match mx | Just v =&gt; v | Nothing =&gt; 0</text>
  </g>

  <g transform="translate(120, 770)">
    <rect x="0" y="0" width="44" height="44" rx="10" fill="#52525B"/>
    <text x="22" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">5</text>
    <text x="70" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">Compute at compile time</text>
    <text x="70" y="66" font-family="ui-monospace, monospace" font-size="22" fill="#E4E4E7">comptime (factorial 5)   # =&gt; 120</text>
  </g>

  <text x="540" y="920" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF">Then run it: <tspan fill="#F59E0B">ko file.ko</tspan></text>
  <text x="540" y="970" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#A1A1AA">JIT in dev. AOT in production. Your call.</text>

  <rect x="240" y="1020" width="600" height="64" rx="32" fill="#F59E0B"/>
  <text x="540" y="1062" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#0D0D1A">⭐ Star on GitHub →</text>

  <line x1="80" y1="1180" x2="1000" y2="1180" stroke="#27272A" stroke-width="1"/>
  <text x="540" y="1224" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" fill="#52525B">github.com/Adjanour/ko-language</text>
</svg>